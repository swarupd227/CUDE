# railway.toml — deploy to Railway.app (https://railway.app)
# Railway detects Node.js automatically. This config fine-tunes it.

[build]
builder = "NIXPACKS"
buildCommand = "node build.js"

[deploy]
startCommand = "cd backend && node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "cude-platform"
